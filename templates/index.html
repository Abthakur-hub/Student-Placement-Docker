<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🎓 Student Placement Predictor</h1>

        <p class="subtitle">
            Enter the student's academic details to predict placement chances.
        </p>

        <form action="/predict" method="POST">

            <div class="row">

                <div class="input-group">
                    <label>Gender</label>

                    <select name="gender" required>
                        <option value="">Select</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>SSC Percentage</label>

                    <input
                        type="number"
                        step="0.01"
                        name="ssc_p"
                        placeholder="Example: 85"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>SSC Board</label>

                    <select name="ssc_b" required>
                        <option value="">Select</option>
                        <option value="Central">Central</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>HSC Percentage</label>

                    <input
                        type="number"
                        step="0.01"
                        name="hsc_p"
                        placeholder="Example: 82"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>HSC Board</label>

                    <select name="hsc_b" required>
                        <option value="">Select</option>
                        <option value="Central">Central</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>HSC Stream</label>

                    <select name="hsc_s" required>
                        <option value="">Select</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Science">Science</option>
                        <option value="Arts">Arts</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>Degree Percentage</label>

                    <input
                        type="number"
                        step="0.01"
                        name="degree_p"
                        placeholder="Example: 75"
                        required>
                </div>

                <div class="input-group">
                    <label>Degree Type</label>

                    <select name="degree_t" required>
                        <option value="">Select</option>
                        <option value="Sci&Tech">Science & Technology</option>
                        <option value="Comm&Mgmt">Commerce & Management</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>Work Experience</label>

                    <select name="workex" required>
                        <option value="">Select</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Employability Test (%)</label>

                    <input
                        type="number"
                        step="0.01"
                        name="etest_p"
                        placeholder="Example: 78"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>MBA Specialisation</label>

                    <select name="specialisation" required>
                        <option value="">Select</option>
                        <option value="Mkt&HR">Marketing & HR</option>
                        <option value="Mkt&Fin">Marketing & Finance</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>MBA Percentage</label>

                    <input
                        type="number"
                        step="0.01"
                        name="mba_p"
                        placeholder="Example: 70"
                        required>
                </div>

            </div>

            <button type="submit">
                Predict Placement
            </button>

        </form>

        {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
